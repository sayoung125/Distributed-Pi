services:
  vision:
    build:
      context: ..
      dockerfile: pi4-2gb-vision/Dockerfile
    container_name: pi4-2gb-vision
    environment:
      - MQTT_BROKER_HOST=${MQTT_BROKER_HOST:-10.0.0.10}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - NODE_NAME=pi4-2gb
      - CONFIDENCE_THRESHOLD=${CONFIDENCE_THRESHOLD:-0.4}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
