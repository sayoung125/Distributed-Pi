# Mosquitto MQTT Broker Configuration
# Runs on Pi Zero as dedicated message bus

# Listen on all interfaces
listener 1883 0.0.0.0

# Allow anonymous connections (internal network only)
allow_anonymous true

# Max packet size: 1MB (base64 frames are ~50-70KB)
max_packet_size 1048576

# Max queued messages per client
max_queued_messages 1000

# Logging
log_dest stdout
log_type error
log_type warning
log_type information
connection_messages true

# Persistence (optional, helps survive broker restart)
persistence true
persistence_location /mosquitto/data/
