services:
  processor:
    build:
      context: ..
      dockerfile: pi4-4gb-dashboard/Dockerfile.processor
    container_name: pi4-4gb-processor
    environment:
      - MQTT_BROKER_HOST=${MQTT_BROKER_HOST:-10.0.0.10}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - NODE_NAME=pi4-4gb
      - CAMERA_INDEX=${CAMERA_INDEX:-0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    devices:
      - /dev/video0:/dev/video0
    restart: unless-stopped

  dashboard:
    build:
      context: ..
      dockerfile: pi4-4gb-dashboard/Dockerfile
    container_name: pi4-4gb-dashboard
    ports:
      - "5000:5000"
    environment:
      - MQTT_BROKER_HOST=${MQTT_BROKER_HOST:-10.0.0.10}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - NODE_NAME=pi4-4gb
      - DASHBOARD_PORT=5000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
