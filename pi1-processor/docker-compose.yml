services:
  processor:
    build:
      context: ..
      dockerfile: pi1-processor/Dockerfile
    container_name: pi1-processor
    environment:
      - MQTT_BROKER_HOST=${MQTT_BROKER_HOST:-10.0.0.10}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - NODE_NAME=pi1
      - CAMERA_INDEX=${CAMERA_INDEX:-0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    devices:
      - /dev/video0:/dev/video0
    restart: unless-stopped
