services:
  ollama:
    image: ollama/ollama:latest
    container_name: pi3-ollama
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  intelligence:
    build:
      context: ..
      dockerfile: pi3-intelligence/Dockerfile
    container_name: pi3-intelligence
    environment:
      - MQTT_BROKER_HOST=${MQTT_BROKER_HOST:-10.0.0.10}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - NODE_NAME=pi3
      - OLLAMA_MODEL=${OLLAMA_MODEL:-tinyllama}
      - OLLAMA_HOST=http://ollama:11434
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama-data:
